<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Staff - Barber Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark px-4 py-3 sticky-top mb-5 animate-fade">
        <span class="navbar-brand text-gold fw-bold">MANAGE STAFF</span>
        <div>
            <a href="/owner" class="btn btn-outline-light btn-sm me-2">Back to Dashboard</a>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
        </div>
    </nav>
    <div class="container">
        <div class="row g-4">
            <div class="col-md-5 animate-slide-left delay-1">
                <div class="luxury-card sticky-top" style="top: 100px;">
                    <h4 class="mb-4 text-white fw-bold">Register New Account</h4>
                    <form method="POST">
                        <div class="form-floating mb-3">
                            <input type="text" name="username" class="form-control" id="uName" placeholder="Username" required>
                            <label for="uName">Username</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="text" name="password" class="form-control" id="uPass" placeholder="Password" required>
                            <label for="uPass">Password</label>
                        </div>
                        <div class="form-floating mb-4">
                            <select name="role" class="form-select" id="uRole">
                                <option value="cashier">Cashier (Staff)</option>
                                <option value="owner">Owner (Admin)</option>
                            </select>
                            <label for="uRole">Account Role</label>
                        </div>
                        <button type="submit" class="btn btn-premium w-100">Create Account</button>
                    </form>
                </div>
            </div>
            <div class="col-md-7 animate-fade-up delay-2">
                <div class="luxury-card">
                    <h4 class="mb-4 text-white fw-bold">Active System Accounts</h4>
                    <div class="table-responsive">
                        <table class="table table-dark table-hover table-borderless mb-0">
                            <thead>
                                <tr class="text-secondary border-bottom border-secondary">
                                    <th class="py-3">USERNAME</th>
                                    <th class="py-3">PASSWORD</th>
                                    <th class="text-end py-3">ROLE ACCESSIBILITY</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for u in users %}
                                <tr class="border-bottom border-secondary align-middle">
                                    <td class="fw-bold text-white">{{ u.username|capitalize }}</td>
                                    <td><span class="badge bg-dark border border-secondary text-secondary font-monospace">{{ u.password }}</span></td>
                                    <td class="text-end">
                                        {% if u.role == 'owner' %}
                                            <span class="badge bg-warning text-dark px-3 py-2 rounded-pill fw-bold">OWNER</span>
                                        {% else %}
                                            <span class="badge bg-secondary text-white px-3 py-2 rounded-pill fw-bold">CASHIER</span>
                                        {% endif %}
                                    </td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
