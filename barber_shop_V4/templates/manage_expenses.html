<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Expenses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="background-color: #0c0c0e;">
    <div class="container py-5">
        <a href="/owner" class="text-gold mb-3 d-block">&larr; Back to Dashboard</a>
        <h2 class="text-white fw-bold mb-4">Expense Management</h2>
        
        <div class="row g-4">
            <div class="col-md-4">
                <div class="luxury-card">
                    <h5 class="text-gold mb-3">Add New Expense</h5>
                    <form method="POST">
                        <div class="form-floating mb-3">
                            <input type="text" name="description" class="form-control" placeholder="e.g. Electricity" required>
                            <label>Description</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="number" name="amount" class="form-control" step="0.01" placeholder="Amount" required>
                            <label>Amount ($)</label>
                        </div>
                        <button type="submit" class="btn btn-premium w-100">Record Expense</button>
                    </form>
                </div>
            </div>
            <div class="col-md-8">
                <div class="luxury-card">
                    <h5 class="text-white mb-3">Expense History (Total: ${{ total|round(2) }})</h5>
                    <table class="table table-dark table-hover">
                        <thead><tr class="text-secondary"><th>DATE</th><th>DESCRIPTION</th><th>AMOUNT</th></tr></thead>
                        <tbody>
                            {% for e in expenses %}
                            <tr>
                                <td>{{ e.date }}</td>
                                <td>{{ e.description }}</td>
                                <td class="text-danger fw-bold">${{ e.amount }}</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
