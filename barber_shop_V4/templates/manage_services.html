<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Services - Barber Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark px-4 py-3 sticky-top mb-5 animate-fade">
        <span class="navbar-brand text-gold fw-bold">MANAGE SERVICES</span>
        <div>
            <a href="/owner" class="btn btn-outline-light btn-sm me-2">Back to Dashboard</a>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
        </div>
    </nav>
    <div class="container">
        <div class="row g-4">
            <div class="col-md-5 animate-slide-left delay-1">
                <div class="luxury-card sticky-top" style="top: 100px;">
                    <h4 class="mb-4 text-white fw-bold">Add New Service</h4>
                    <form method="POST" action="/manage_services">
                        <div class="form-floating mb-3">
                            <input type="text" name="name" class="form-control" id="sName" placeholder="e.g. Hair Wash" required>
                            <label for="sName">Service Name</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="number" name="price" step="0.01" class="form-control" id="sPrice" placeholder="0.00" required>
                            <label for="sPrice">Price ($)</label>
                        </div>
                        <button type="submit" class="btn btn-premium w-100">Add Service to Menu</button>
                    </form>
                </div>
            </div>
            <div class="col-md-7 animate-fade-up delay-2">
                <div class="luxury-card">
                    <h4 class="mb-4 text-white fw-bold">Service Menu Configuration</h4>
                    <div class="table-responsive">
                        <table class="table table-dark table-hover table-borderless mb-0">
                            <thead>
                                <tr class="text-secondary border-bottom border-secondary">
                                    <th class="py-3">SERVICE NAME</th>
                                    <th class="py-3 text-center">PRICE</th>
                                    <th class="text-end py-3">ACTIONS</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for s in services %}
                                <tr class="border-bottom border-secondary align-middle">
                                    <td class="fw-bold text-white">{{ s.name }}</td>
                                    <td class="text-center fw-bold text-gold">${{ s.price }}</td>
                                    <td class="text-end">
                                        <button class="btn btn-sm btn-outline-warning px-3 rounded-pill" data-bs-toggle="modal" data-bs-target="#editModal{{ s.id }}">Edit</button>
                                        <form action="/delete_service/{{ s.id }}" method="POST" class="d-inline" onsubmit="return confirm('Delete this service permanently?');">
                                            <button type="submit" class="btn btn-sm btn-outline-danger px-3 rounded-pill ms-1">Delete</button>
                                        </form>
                                    </td>
                                </tr>
                                <div class="modal fade" id="editModal{{ s.id }}" tabindex="-1" aria-hidden="true">
                                  <div class="modal-dialog modal-dialog-centered">
                                    <div class="modal-content bg-dark border border-warning" style="border-radius: 16px;">
                                      <div class="modal-header border-secondary">
                                        <h5 class="modal-title text-gold fw-bold">Edit Service</h5>
                                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                                      </div>
                                      <form action="/edit_service/{{ s.id }}" method="POST">
                                          <div class="modal-body">
                                              <div class="form-floating mb-3">
                                                  <input type="text" name="name" class="form-control" value="{{ s.name }}" required>
                                                  <label>Service Name</label>
                                              </div>
                                              <div class="form-floating">
                                                  <input type="number" name="price" step="0.01" class="form-control" value="{{ s.price }}" required>
                                                  <label>Price ($)</label>
                                              </div>
                                          </div>
                                          <div class="modal-footer border-secondary">
                                              <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancel</button>
                                              <button type="submit" class="btn btn-premium">Save Changes</button>
                                          </div>
                                      </form>
                                    </div>
                                  </div>
                                </div>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
